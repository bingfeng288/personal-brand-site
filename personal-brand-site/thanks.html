<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交成功 - 柳秉含</title>
    <style>
        :root {
            --primary: #1a365d;
            --accent: #d69e2e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f7fafc;
            color: #1a202c;
        }
        .success-card {
            text-align: center;
            padding: 60px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            max-width: 480px;
        }
        .success-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.75rem;
            color: var(--primary);
            margin-bottom: 12px;
        }
        p {
            color: #4a5568;
            font-size: 1.0625rem;
            margin-bottom: 32px;
            line-height: 1.7;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            background: var(--accent);
            color: white;
            text-decoration: none;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #b7791f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✅</div>

        <p>感谢你的信任！我会在 24 小时内通过你留下的联系方式回复。如有紧急需求，请直接微信联系：18336972050</p>
        <a href="index.html" class="btn">返回首页</a>
    </div>
</body>
</html>
